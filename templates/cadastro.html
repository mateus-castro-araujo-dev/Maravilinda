{% extends 'base.html' %}
{% block title %}Criar Conta — Maravilinda{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">
      <a href="{% url 'index' %}" class="logo">Maravilinda</a>
      <p>Crie sua conta</p>
    </div>

    <form method="POST" action="{% url 'cadastro' %}">
      {% csrf_token %}
      <div class="form-grid" style="margin-bottom:24px">
        <div class="form-group">
          <label>Nome Completo *</label>
          <input type="text" name="name" placeholder="Maria Silva" required minlength="2" autofocus>
        </div>
        <div class="form-group">
          <label>E-mail *</label>
          <input type="email" name="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Telefone (opcional)</label>
          <input type="tel" name="phone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
          <label>Senha * <span style="font-size:10px;color:var(--texto-suave);text-transform:none;letter-spacing:0.02em">(mín. 8 caracteres)</span></label>
          <input type="password" name="password" placeholder="••••••••" required minlength="8">
        </div>
        <div class="form-group">
          <label>Confirmar Senha *</label>
          <input type="password" name="confirm_password" placeholder="••••••••" required minlength="8">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Criar Conta <i class="ph-light ph-flower-lotus"></i></button>
      <p style="font-size:11px;color:var(--texto-suave);text-align:center;margin-top:16px;line-height:1.7;letter-spacing:0.04em">
        Ao criar conta você concorda com nossa <a href="#" style="color:var(--rosa-deep);border-bottom:1px solid var(--rosa-deep)">Política de Privacidade</a>
      </p>
    </form>

    <div class="auth-footer">
      Já tem conta? <a href="{% url 'login' %}">Entrar</a>
    </div>
  </div>
</div>
{% endblock %}

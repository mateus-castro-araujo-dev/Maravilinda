{% extends 'base.html' %}
{% block title %}Senha redefinida — Maravilinda{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{% url 'index' %}" class="logo">Maravilinda</a>
    </div>

    <div style="text-align:center;padding:20px 0">
      <div style="font-size:48px;color:var(--rosa-deep);margin-bottom:16px"><i class="ph-light ph-check-circle"></i></div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px">Senha redefinida</h2>
      <p style="color:var(--texto-suave);font-size:13px;line-height:1.7">
        Sua nova senha foi salva. Agora é só entrar com ela.
      </p>
    </div>

    <a href="{% url 'login' %}" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
      Entrar <i class="ph ph-arrow-right"></i>
    </a>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Link enviado — Maravilinda{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{% url 'index' %}" class="logo">Maravilinda</a>
    </div>

    <div style="text-align:center;padding:20px 0">
      <div style="font-size:48px;color:var(--rosa-deep);margin-bottom:16px"><i class="ph-light ph-envelope-simple"></i></div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px">Verifique seu e-mail</h2>
      <p style="color:var(--texto-suave);font-size:13px;line-height:1.7">
        Se existe uma conta com esse e-mail, enviamos um link para redefinir sua senha. Ele expira em algumas horas.
      </p>
    </div>

    <div class="auth-footer">
      <a href="{% url 'login' %}">Voltar ao login</a>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Esqueci a senha — Maravilinda{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{% url 'index' %}" class="logo">Maravilinda</a>
      <p>Informe seu e-mail para receber o link de redefinição</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="form-grid" style="margin-bottom:24px">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" name="email" placeholder="seu@email.com" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Enviar link <i class="ph ph-arrow-right"></i>
      </button>
    </form>

    <div class="auth-footer">
      Lembrou? <a href="{% url 'login' %}">Voltar ao login</a>
    </div>
  </div>
</div>
{% endblock %}
